<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lección 4 — Práctica: Colores de Témpera</title>
    
    <style>

        body {
            background-color: white;
        }

        .titulo-principal {
            color: purple;
            font-family: 'Arial Black', sans-serif;
            font-size: 45px;
        }

        h2 {
            color: darkslategrey;
            font-family: Georgia, serif;
            font-size: 28px;
        }

        .introduccion {
            font-family: Calibri, sans-serif;
            font-size: 18px;
            color: #333333;
        }


        .color-rojo {
            text-align: center;
            font-family: 'Comic Sans MS', cursive;
            font-size: 22px;
            color: red;
        }

        .color-azul {
            text-align: center;
            font-family: Impact, sans-serif;
            font-size: 30px;
            color: blue;
        }

        .color-amarillo {
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 25px;
            color: gold; 
        }

        .color-verde {
            text-align: center;
            font-family: 'Trebuchet MS', sans-serif;
            font-size: 20px;
            color: green;
        }

        .color-negro {
            text-align: center;
            font-family: 'Times New Roman', serif;
            font-size: 24px;
            color: black;
        }
    </style>
</head>
<body>

    <h1 class="titulo-principal">El Mundo de las Témperas</h1>
    
    <p class="introduccion">
        Las témperas son pinturas con base de agua, opacas y perfectas para aprender a mezclar colores. 
        Hoy veremos los colores que usualmente vienen en un set escolar básico.
    </p>

    <h2>Mis Témperas Favoritas</h2>

    <p class="color-rojo">Color Rojo</p>
    <p class="color-azul">Color Azul</p>
    <p class="color-amarillo">Color Amarillo</p>
    <p class="color-verde">Color Verde</p>
    <p class="color-negro">Color Negro</p>

</body>
</html>
